<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4a04a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a04a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ffe0a0"/>
      <stop offset="100%" stop-color="#d4a04a"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0a0b0f"/>
  <!-- Subtle glow behind pin -->
  <circle cx="16" cy="13" r="11" fill="url(#glow)"/>
  <!-- Map pin body -->
  <path d="M16 27 C16 27 6.5 16.5 6.5 12 C6.5 6.75 10.75 3 16 3 C21.25 3 25.5 6.75 25.5 12 C25.5 16.5 16 27 16 27Z"
        fill="none" stroke="#d4a04a" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Inner circle ring -->
  <circle cx="16" cy="11.5" r="4.5" fill="none" stroke="#d4a04a" stroke-width="1.2" opacity="0.6"/>
  <!-- AI node center dot -->
  <circle cx="16" cy="11.5" r="2" fill="url(#node)"/>
  <!-- Tiny satellite dots suggesting network/AI -->
  <circle cx="11.5" cy="9" r="0.8" fill="#d4a04a" opacity="0.5"/>
  <circle cx="20.5" cy="9" r="0.8" fill="#d4a04a" opacity="0.5"/>
  <circle cx="16" cy="6.5" r="0.8" fill="#d4a04a" opacity="0.5"/>
  <!-- Faint connection lines from center to satellite dots -->
  <line x1="16" y1="11.5" x2="11.5" y2="9" stroke="#d4a04a" stroke-width="0.4" opacity="0.3"/>
  <line x1="16" y1="11.5" x2="20.5" y2="9" stroke="#d4a04a" stroke-width="0.4" opacity="0.3"/>
  <line x1="16" y1="11.5" x2="16" y2="6.5" stroke="#d4a04a" stroke-width="0.4" opacity="0.3"/>
</svg>
