name: Update AI Regulation Data

on:
  schedule:
    # Run at 6am UTC on the 1st of every month
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      countries:
        description: 'Comma-separated countries to update (leave empty for auto-select based on staleness)'
        required: false
        default: ''
      force_update:
        description: 'Force update all selected countries regardless of staleness'
        required: false
        default: 'false'
        type: boolean
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-sonnet-4-6'
      search:
        description: 'Enable web search for priority countries'
        required: false
        default: 'false'
        type: boolean
      search_all:
        description: 'Enable web search for ALL countries (Sonnet; ~$10-12 for a full run with batch)'
        required: false
        default: 'false'
        type: boolean
      batch:
        description: 'Use the Message Batches API (50% token pricing, results within ~1h)'
        required: false
        default: true
        type: boolean

# Never let two data runs (a manual dispatch overlapping the monthly cron)
# race to git push. cancel-in-progress: false queues the second run instead of
# clobbering the first mid-write.
concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit updated CSV/JSON files back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Refresh the verified policy-initiative records before researching, so
      # a grounded run reads current evidence. Gated on the repo variable
      # EVIDENCE_SYNC_ENABLED (flip to 'true' after the first successful
      # manual sync via evidence-sync.yml). continue-on-error + the module's
      # own warn-and-exit-0 network handling mean an OECD outage can never
      # break the data run.
      - name: Sync evidence (OECD)
        if: ${{ vars.EVIDENCE_SYNC_ENABLED == 'true' }}
        continue-on-error: true
        env:
          PYTHONPATH: scripts
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m regulation_pipeline.evidence sync --source oecd

      - name: Run data update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Supabase dual-write mirror (auto-activates when both are set;
          # mirror failures never fail the run).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IS_SCHEDULED: ${{ github.event_name == 'schedule' }}
          INPUT_COUNTRIES: ${{ github.event.inputs.countries || '' }}
          INPUT_MODEL: ${{ github.event.inputs.model || 'claude-sonnet-4-6' }}
          INPUT_FORCE: ${{ (github.event.inputs.force_update == 'true') && '--force' || '' }}
          INPUT_SEARCH: ${{ (github.event_name == 'schedule' || github.event.inputs.search == 'true') && '--search' || '' }}
          INPUT_SEARCH_ALL: ${{ (github.event.inputs.search_all == 'true') && '--search-all' || '' }}
          INPUT_BATCH: ${{ (github.event_name == 'schedule' || github.event.inputs.batch == 'true') && '--batch' || '' }}
          INPUT_GROUNDED: ${{ (vars.EVIDENCE_SYNC_ENABLED == 'true') && '--grounded' || '' }}
        run: |
          # pipefail: tee must not mask the script's exit code — the
          # partial-failure contract (exit 1) drives the step status.
          set -o pipefail
          python scripts/update_data.py \
            --countries "$INPUT_COUNTRIES" \
            --model "$INPUT_MODEL" \
            $INPUT_FORCE \
            $INPUT_SEARCH \
            $INPUT_SEARCH_ALL \
            $INPUT_BATCH \
            $INPUT_GROUNDED 2>&1 | tee run.log

      - name: Run summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo "## Data update"
            echo '```'
            grep -E "Countries to update|Done\.|Failed countries|mirror:|evidence" run.log | tail -20 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for changes
        id: changes
        # Run even if the update step reported failures (non-zero exit for
        # partial success): the countries that DID update are already written to
        # disk and must still be committed, or the whole month's work is lost.
        if: ${{ !cancelled() }}
        run: |
          # Stage first so the brand-new subscores.json (untracked on its
          # first run) is detected too.
          git add public/scores.csv public/regulation_data.csv public/history.json
          if [ -f public/data/subscores.json ]; then git add public/data/subscores.json; fi
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        # Only ever push from the default branch — a manual dispatch on some
        # other ref must not write data commits there.
        if: ${{ !cancelled() && steps.changes.outputs.changed == 'true' && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "AI Regulation Bot"
          git config user.email "bot@github-actions"
          git commit -m "chore: automated data update $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
